<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPA_CPM - PORTAL DE PILOTOS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0b10; --azul: #00f0ff; --rosa: #ff007f; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card-post { background: #1a1a2e; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        #chat-box { height: 300px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; margin: 10px 0; }
        .msg-box { margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .btn-neon { width: 100%; padding: 12px; background: var(--azul); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
        .input-field { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: none; background: #222; color: #fff; box-sizing: border-box; }
        #painel-admin { border: 2px dashed var(--rosa); padding: 15px; border-radius: 15px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>FEED TPA_CPM</h1>
        <div id="feed-noticias"></div>

        <div id="chat-box"></div>
        <input type="text" id="chat-user" class="input-field" placeholder="Teu apelido...">
        <input type="text" id="chat-msg" class="input-field" placeholder="Mensagem...">
        <button class="btn-neon" onclick="enviarMensagem()">Enviar Mensagem</button>

        <div id="painel-admin">
            <h3>👑 PAINEL ADM</h3>
            <input type="text" id="post-titulo" class="input-field" placeholder="Título da Notícia">
            <input type="file" id="post-file">
            <button class="btn-neon" style="background: var(--rosa);" onclick="publicar()">Publicar no Feed</button>
        </div>
    </div>

    <script>
        const sb = supabase.createClient("https://mricbliq3frbyny6rfrh.supabase.co", "sb_publishable_mRiCBLIq3fRbYnY6RFRrHw_xe5r6Ytq");

        async function carregarTudo() {
            // Carrega Feed
            const { data: posts } = await sb.from('feed_noticias').select('*').order('criado_em', { ascending: false });
            document.getElementById('feed-noticias').innerHTML = posts.map(p => `
                <div class="card-post">
                    <h3>${p.titulo}</h3>
                    <img src="${p.media_url}" width="100%" style="border-radius:10px;">
                </div>`).join('');
            
            // Carrega Chat
            const { data: chats } = await sb.from('chat_pilotos').select('*').order('criado_em', { ascending: true });
            document.getElementById('chat-box').innerHTML = chats.map(c => `
                <div class="msg-box"><b>${c.username}</b>: ${c.mensagem}</div>`).join('');
        }

        async function enviarMensagem() {
            const u = document.getElementById('chat-user').value || "Piloto";
            const m = document.getElementById('chat-msg').value;
            await sb.from('chat_pilotos').insert([{ username: u, mensagem: m }]);
            document.getElementById('chat-msg').value = '';
            carregarTudo();
        }

        async function publicar() {
            const file = document.getElementById('post-file').files[0];
            const { data: u } = await sb.storage.from('MIDIA_CPM').upload(Date.now().toString(), file);
            const { data: l } = sb.storage.from('MIDIA_CPM').getPublicUrl(u.path);
            await sb.from('feed_noticias').insert([{ titulo: document.getElementById('post-titulo').value, media_url: l.publicUrl }]);
            carregarTudo();
        }

        // Realtime Chat
        sb.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_pilotos' }, () => carregarTudo()).subscribe();

        carregarTudo();
    </script>
</body>
</html>
