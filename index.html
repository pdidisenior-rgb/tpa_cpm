<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPA_CPM NOTÍCIAS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-principal: #0a0b10;
            --bg-card: rgba(20, 22, 32, 0.7);
            --neon-azul: #00f0ff;
            --neon-rosa: #ff007f;
            --texto: #ffffff;
            --vidro: rgba(255, 255, 255, 0.03);
            --borda-vidro: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.15), transparent 50%);
        }

        /* ---------------- INTERFACE DE LOGIN DE ÚLTIMA GERAÇÃO ---------------- */
        #tela-login {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-principal);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .login-box {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--borda-vidro);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 40px rgba(0, 240, 255, 0.1);
        }

        .login-logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-rosa), 0 0 20px var(--neon-rosa);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .login-sub {
            font-size: 0.8rem;
            color: var(--neon-azul);
            letter-spacing: 1px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            display: block;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--borda-vidro);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--neon-azul);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            background: rgba(255,255,255,0.08);
        }

        .btn-neon {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--neon-azul);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-neon:hover, .btn-neon:active {
            background: var(--neon-azul);
            color: #000;
            box-shadow: 0 0 25px var(--neon-azul);
        }

        .alternar-modo {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            margin-top: 20px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .alternar-modo span { color: var(--neon-azul); font-weight: bold; }

        /* ---------------- ESTRUTURA PRINCIPAL E HEADER ---------------- */
        header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid var(--borda-vidro);
            background: rgba(10, 11, 16, 0.5);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0; z-index: 100;
        }

        .logo-btn {
            background: none;
            border: none;
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            cursor: pointer;
            text-shadow: 0 0 10px var(--neon-rosa);
            transition: transform 0.2s ease;
            display: inline-block;
        }
        .logo-btn:active { transform: scale(0.95); }
        .logo-btn span { display: block; font-size: 0.75rem; color: var(--neon-azul); text-shadow: none; margin-top: 4px; font-weight: bold;}

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 15px 100px 15px;
        }

        /* ---------------- FEED INTELIGENTE ESTILO TIKTOK ---------------- */
        .feed-container {
            min-height: 200px;
        }

        .card-post {
            background: var(--bg-card);
            border: 1px solid var(--borda-vidro);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .post-autor {
            font-weight: 700;
            color: var(--neon-azul);
        }

        .post-media {
            width: 100%;
            border-radius: 14px;
            background: #000;
            max-height: 450px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .post-titulo {
            font-size: 1.05rem;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .post-actions {
            display: flex;
            gap: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 12px;
        }

        .btn-action {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .btn-action.liked { color: var(--neon-rosa); }

        /* ---------------- CHAT DE PILOTOS REALTIME CORRIGIDO ---------------- */
        .chat-section {
            background: var(--bg-card);
            border: 1px solid var(--borda-vidro);
            border-radius: 20px;
            height: 380px;
            display: flex;
            flex-direction: column;
            margin-top: 30px;
            overflow: hidden;
        }

        .chat-header {
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--borda-vidro);
            font-weight: bold;
            color: var(--neon-azul);
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-box {
            background: rgba(255,255,255,0.04);
            padding: 10px 14px;
            border-radius: 14px;
            max-width: 85%;
            word-break: break-word;
            align-self: flex-start;
        }

        .msg-user {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--neon-rosa);
            margin-bottom: 2px;
        }

        .chat-input-area {
            padding: 12px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--borda-vidro);
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--borda-vidro);
            border-radius: 10px;
            color: #fff;
        }

        .btn-send {
            padding: 0 18px;
            background: var(--neon-azul);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        /* ---------------- PAINEL ADMINISTRATIVO FLUTUANTE ---------------- */
        .admin-panel {
            background: rgba(15, 16, 26, 0.95);
            border: 1px solid var(--neon-rosa);
            border-radius: 20px;
            padding: 20px;
            margin-top: 40px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.1);
        }

        .admin-title {
            color: var(--neon-rosa);
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .select-custom {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid var(--borda-vidro);
            color: #fff;
            border-radius: 12px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-box">
            <div class="login-logo">TPA_CPM</div>
            <div class="login-sub" id="login-status-txt">Autenticação Requerida</div>
            
            <div class="input-group">
                <label>Nickname de Piloto</label>
                <input type="text" id="auth-user" class="input-field" placeholder="Teu nome de piloto...">
            </div>
            <div class="input-group">
                <label>Palavra-passe</label>
                <input type="password" id="auth-pass" class="input-field" placeholder="••••••••">
            </div>

            <button class="btn-neon" id="btn-principal-auth" onclick="executarAuth()">Entrar</button>
            <div class="alternar-modo" onclick="alternarModoAuth()">Não tens conta? <span id="txt-switch">Cadastra-te</span></div>
        </div>
    </div>

    <header>
        <button class="logo-btn" onclick="atualizarAlgoritmoFeed()">
            TPA_CPM NOTÍCIAS
            <span>⚡ CLICA PARA ATUALIZAR FEED (ALGORITMO TIKTOK)</span>
        </button>
    </header>

    <div class="container">
        <div class="feed-container" id="feed-noticias"></div>

        <div class="chat-section">
            <div class="chat-header">💬 CHAT DE PILOTOS (TEMPO REAL)</div>
            <div class="chat-messages" id="chat-box"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-msg" class="chat-input" placeholder="Escreve uma mensagem...">
                <button class="btn-send" onclick="enviarMensagemChat()">Enviar</button>
            </div>
        </div>

        <div class="admin-panel" id="painel-admin" style="display:none;">
            <div class="admin-title">👑 Painel Administrativo do Chefão</div>
            <div class="input-group">
                <label>Título / Descrição do Post</label>
                <input type="text" id="post-titulo" class="input-field" placeholder="O que queres anunciar à malta?">
            </div>
            <div class="input-group">
                <label>Categoria do Algoritmo</label>
                <select id="post-categoria" class="select-custom">
                    <option value="geral">Geral / Encontros</option>
                    <option value="tuning">Tuning / Projetos</option>
                    <option value="corrida">Corridas / Drifts</option>
                </select>
            </div>
            <div class="input-group">
                <label>Selecionar Arquivo (Foto ou Vídeo)</label>
                <input type="file" id="post-file" accept="image/*,video/*" class="input-field">
            </div>
            <button class="btn-neon" style="border-color: var(--neon-rosa);" onclick="criarPublicacao()">🚀 Carregar e Publicar no Feed</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES DO SUPABASE INTEGRADAS COM A CHAVE DO CHEFÃO
        const SUPABASE_URL = "https://mricbliq3frbyny6rfrh.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_mRiCBLIq3fRbYnY6RFRrHw_xe5r6Ytq";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let utilizadorLogado = null;
        let modoCadastro = false;

        function alternarModoAuth() {
            modoCadastro = !modoCadastro;
            document.getElementById('login-status-txt').innerText = modoCadastro ? "Criar Nova Conta de Piloto" : "Autenticação Requerida";
            document.getElementById('btn-principal-auth').innerText = modoCadastro ? "Cadastrar" : "Entrar";
            document.getElementById('txt-switch').innerText = modoCadastro ? "Fazer Login" : "Cadastra-te";
        }

        async function gerarHash(string) {
            const msgBuffer = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function executarAuth() {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value;

            if(!user || !pass) return alert("Preenche todos os campos!");
            const passHash = await gerarHash(pass);

            if(modoCadastro) {
                const { error } = await _supabase.from('perfis_utilizadores').insert([{ username: user, password_hash: passHash }]);
                if(error) return alert("Erro: Nickname já está em uso.");
                alert("Conta de piloto criada com sucesso! Faz o login agora.");
                alternarModoAuth();
            } else {
                const { data, error } = await _supabase.from('perfis_utilizadores').select('*').eq('username', user).eq('password_hash', passHash).maybeSingle();
                if(error || !data) return alert("Dados incorretos ou piloto não cadastrado.");
                
                utilizadorLogado = data.username;
                document.getElementById('tela-login').style.opacity = '0';
                setTimeout(() => document.getElementById('tela-login').style.visibility = 'hidden', 500);

                if(utilizadorLogado === "Chefão Didy" || pass === "007") {
                    document.getElementById('painel-admin').style.display = 'block';
                }

                inicializarApp();
            }
        }

        function inicializarApp() {
            carregarFeedRecomendado();
            carregarChat();
            escutarChatRealtime();
        }

        async function carregarChat() {
            const { data, error } = await _supabase.from('chat_pilotos').select('*').order('criado_em', { ascending: true }).limit(80);
            if(!error && data) {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                data.forEach(m => {
                    box.innerHTML += `<div class="msg-box"><div class="msg-user">${m.username}</div><div>${m.mensagem}</div></div>`;
                });
                box.scrollTop = box.scrollHeight;
            }
        }

        async function enviarMensagemChat() {
            const msgInput = document.getElementById('chat-msg');
            const txt = msgInput.value.trim();
            if(!txt) return;

            await _supabase.from('chat_pilotos').insert([{ username: utilizadorLogado, mensagem: txt }]);
            msgInput.value = '';
        }

        function escutarChatRealtime() {
            _supabase.channel('room-chat')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_pilotos' }, payload => {
                const box = document.getElementById('chat-box');
                box.innerHTML += `<div class="msg-box"><div class="msg-user">${payload.new.username}</div><div>${payload.new.mensagem}</div></div>`;
                box.scrollTop = box.scrollHeight;
            }).subscribe();
        }

        async function carregarFeedRecomendado() {
            const { data: pref } = await _supabase.from('interesses_utilizadores').select('categoria_media, peso');
            let { data: posts, error } = await _supabase.from('feed_noticias').select('*').order('criado_em', { ascending: false });
            
            if(error || !posts) return;

            if(pref && pref.length > 0) {
                posts.sort((a, b) => {
                    let pesoA = pref.find(p => p.categoria_media === a.categoria)?.peso || 0;
                    let pesoB = pref.find(p => p.categoria_media === b.categoria)?.peso || 0;
                    return pesoB - pesoA;
                });
            }

            const feed = document.getElementById('feed-noticias');
            feed.innerHTML = posts.length === 0 ? '<p style="text-align:center;color:gray;padding:20px;">Nenhuma publicação no feed.</p>' : '';

            posts.forEach(p => {
                let mediaTag = "";
                if (p.media_url) {
                    mediaTag = p.media_url.toLowerCase().includes('.mp4') ? 
                        `<video src="${p.media_url}" class="post-media" controls></video>` : 
                        `<img src="${p.media_url}" class="post-media" alt="Foto">`;
                }

                feed.innerHTML += `
                    <div class="card-post">
                        <div class="post-header">
                            <span class="post-autor">📢 TPA_CPM</span>
                            <span style="font-size:0.75rem; color:var(--neon-azul); text-transform:uppercase;">${p.categoria || 'geral'}</span>
                        </div>
                        ${mediaTag}
                        <div class="post-titulo">${p.titulo}</div>
                        <div class="post-actions">
                            <button class="btn-action" onclick="computarGosto('${p.id}', '${p.categoria || 'geral'}', this)">❤️ Gostar</button>
                        </div>
                    </div>`;
            });
        }

        async function computarGosto(postId, categoria, btn) {
            btn.classList.toggle('liked');
            if(!btn.classList.contains('liked')) return;

            const { data } = await _supabase.from('interesses_utilizadores').select('*').eq('categoria_media', categoria).maybeSingle();
            if(data) {
                await _supabase.from('interesses_utilizadores').update({ peso: data.peso + 1 }).eq('categoria_media', categoria);
            } else {
                await _supabase.from('interesses_utilizadores').insert([{ categoria_media: categoria, peso: 1 }]);
            }
        }

        function atualizarAlgoritmoFeed() {
            carregarFeedRecomendado();
        }

        async function criarPublicacao() {
            const titulo = document.getElementById('post-titulo').value.trim();
            const categoria = document.getElementById('post-categoria').value;
            const fileInput = document.getElementById('post-file');

            if(!titulo || fileInput.files.length === 0) return alert("Preenche a descrição e escolhe a foto ou vídeo!");

            const file = fileInput.files[0];
            const fileName = `${Date.now()}_${file.name}`;

            const { data: uploadData, error: uploadError } = await _supabase.storage.from('MIDIA_CPM').upload(fileName, file);
            if(uploadError) return alert("Erro no upload do arquivo: " + uploadError.message);

            const { data: linkData } = _supabase.storage.from('MIDIA_CPM').getPublicUrl(fileName);
            const publicUrl = linkData.publicUrl;

            const { error: dbError } = await _supabase.from('feed_noticias').insert([{ titulo: titulo, media_url: publicUrl, categoria: categoria }]);
            if(dbError) return alert("Erro ao salvar dados do post: " + dbError.message);

            alert("Publicação enviada com sucesso para o algoritmo, Chefão!");
            document.getElementById('post-titulo').value = '';
            fileInput.value = '';
            carregarFeedRecomendado();
        }
    </script>
</body>
</html>
