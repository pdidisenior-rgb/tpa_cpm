<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPA_CPM NOTÍCIAS</title>
    <!-- Carrega a biblioteca Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-principal: #0a0b10; --neon-azul: #00f0ff; --neon-rosa: #ff007f; --texto: #ffffff; }
        body { background-color: var(--bg-principal); color: var(--texto); font-family: sans-serif; margin: 0; }
        #tela-login { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-principal); z-index:1000; display:flex; align-items:center; justify-content:center; }
        .login-box { background: #1a1a2e; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; }
        .input-field { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; }
        .btn-neon { width: 100%; padding: 10px; background: var(--neon-azul); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .card-post { background: #1a1a2e; margin: 20px; padding: 15px; border-radius: 15px; }
        .post-media { width: 100%; border-radius: 10px; }
        #painel-admin { display: none; padding: 20px; background: #252545; border-radius: 15px; margin: 20px; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="tela-login">
        <div class="login-box">
            <h2>TPA_CPM</h2>
            <p id="login-status-txt">Autenticação Requerida</p>
            <input type="text" id="auth-user" class="input-field" placeholder="Nickname">
            <input type="password" id="auth-pass" class="input-field" placeholder="Senha">
            <button class="btn-neon" id="btn-principal-auth" onclick="executarAuth()">Entrar</button>
            <p onclick="alternarModoAuth()" style="cursor:pointer; font-size: 0.8rem; margin-top:10px;" id="txt-switch">Cadastra-te</p>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="conteudo" style="padding-bottom: 50px;">
        <h1 style="text-align:center; padding-top:20px;">TPA_CPM NOTÍCIAS</h1>
        <div id="feed-noticias"></div>
        <div id="chat-box" style="height: 200px; overflow-y:scroll; border: 1px solid #333; margin: 20px; padding: 10px;"></div>
        <div style="margin: 20px;">
            <input type="text" id="chat-msg" placeholder="Mensagem...">
            <button onclick="enviarMensagemChat()">Enviar</button>
        </div>
    </div>

    <!-- PAINEL ADMIN -->
    <div id="painel-admin">
        <h3>👑 Painel Admin</h3>
        <input type="text" id="post-titulo" class="input-field" placeholder="Título">
        <input type="file" id="post-file">
        <button class="btn-neon" onclick="criarPublicacao()">Publicar</button>
    </div>

    <script>
        // CONFIGURAÇÃO DO SUPABASE
        const SUPABASE_URL = "https://mricbliq3frbyny6rfrh.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_mRiCBLIq3fRbYnY6RFRrHw_xe5r6Ytq";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // VARIÁVEIS DE ESTADO
        let utilizadorLogado = null;
        let modoCadastro = false;
    </script>

    <!-- CHAMADA DOS MÓDULOS JS QUE JÁ CRIASTE -->
    <script src="auth.js"></script>
    <script src="chat.js"></script>
    <script src="feed.js"></script>
</body>
</html>
