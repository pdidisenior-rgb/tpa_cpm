<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPA_CPM NOTÍCIAS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-principal: #0a0b10; --bg-card: rgba(20, 22, 32, 0.7); --neon-azul: #00f0ff; --neon-rosa: #ff007f; --texto: #ffffff; --borda-vidro: rgba(255, 255, 255, 0.08); }
        body { background-color: var(--bg-principal); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; }
        /* Estrutura Login */
        #tela-login { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-principal); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--borda-vidro); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; }
        .input-field { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--borda-vidro); border-radius: 12px; color: #fff; margin: 10px 0; }
        .btn-neon { width: 100%; padding: 15px; background: transparent; border: 2px solid var(--neon-azul); border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-neon:hover { background: var(--neon-azul); color: #000; }
        /* App Style */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card-post { background: var(--bg-card); border: 1px solid var(--borda-vidro); border-radius: 20px; padding: 16px; margin-bottom: 25px; }
        .post-media { width: 100%; border-radius: 14px; background: #000; margin-bottom: 12px; }
        #chat-box { height: 300px; overflow-y: auto; background: #000; padding: 15px; border-radius: 14px; margin-top: 20px; }
        #painel-admin { background: #151525; padding: 20px; border-radius: 20px; margin-top: 30px; border: 1px solid var(--neon-rosa); }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-box">
            <h2 id="login-status-txt">Autenticação Requerida</h2>
            <input type="text" id="auth-user" class="input-field" placeholder="Nickname">
            <input type="password" id="auth-pass" class="input-field" placeholder="Senha">
            <button class="btn-neon" id="btn-principal-auth" onclick="executarAuth()">Entrar</button>
            <p onclick="alternarModoAuth()" style="cursor:pointer; margin-top:15px;" id="txt-switch">Cadastra-te</p>
        </div>
    </div>

    <div class="container" id="app" style="display:none;">
        <h1 style="text-align:center;">FEED TPA_CPM</h1>
        <div id="feed-noticias"></div>
        <div id="chat-box"></div>
        <input type="text" id="chat-msg" class="input-field" placeholder="Escreve...">
        <button class="btn-neon" onclick="enviarMensagem()">Enviar</button>
        <div id="painel-admin" style="display:none;">
            <h3>👑 PAINEL ADMIN</h3>
            <input type="text" id="post-titulo" class="input-field" placeholder="Título">
            <input type="file" id="post-file">
            <button class="btn-neon" onclick="criarPublicacao()">Publicar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mricbliq3frbyny6rfrh.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mRiCBLIq3fRbYnY6RFRrHw_xe5r6Ytq";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let user = null, isCad = false;

        function alternarModoAuth() {
            isCad = !isCad;
            document.getElementById('login-status-txt').innerText = isCad ? "Criar Conta" : "Autenticação";
            document.getElementById('btn-principal-auth').innerText = isCad ? "Cadastrar" : "Entrar";
            document.getElementById('txt-switch').innerText = isCad ? "Login" : "Cadastra-te";
        }

        async function executarAuth() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value;
            if(!u || !p) return alert("Preenche tudo, Chefão!");
            
            if(isCad) {
                await sb.from('perfis_utilizadores').insert([{ username: u, password_hash: p }]);
                alert("Conta criada!");
            }
            const { data } = await sb.from('perfis_utilizadores').select('*').eq('username', u).eq('password_hash', p).maybeSingle();
            if(data || (u === "Chefão Didy" && p === "007")) {
                user = u;
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                if(user === "Chefão Didy") document.getElementById('painel-admin').style.display = 'block';
                carregarTudo();
            } else { alert("Acesso negado."); }
        }

        async function carregarTudo() {
            const { data: posts } = await sb.from('feed_noticias').select('*');
            document.getElementById('feed-noticias').innerHTML = posts.map(p => `<div class="card-post"><h3>${p.titulo}</h3><img src="${p.media_url}" class="post-media"></div>`).join('');
            const { data: chats } = await sb.from('chat_pilotos').select('*');
            document.getElementById('chat-box').innerHTML = chats.map(c => `<div><b>${c.username}</b>: ${c.mensagem}</div>`).join('');
        }

        async function enviarMensagem() {
            const m = document.getElementById('chat-msg').value;
            await sb.from('chat_pilotos').insert([{ username: user, mensagem: m }]);
            document.getElementById('chat-msg').value = '';
            carregarTudo();
        }

        async function criarPublicacao() {
            const file = document.getElementById('post-file').files[0];
            const { data: u } = await sb.storage.from('MIDIA_CPM').upload(Date.now().toString(), file);
            const { data: l } = sb.storage.from('MIDIA_CPM').getPublicUrl(u.path);
            await sb.from('feed_noticias').insert([{ titulo: document.getElementById('post-titulo').value, media_url: l.publicUrl }]);
            carregarTudo();
        }
    </script>
</body>
</html>
